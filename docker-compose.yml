services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: the_hud
      POSTGRES_USER: hud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - hud_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hud -d the_hud"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgresql://hud:${POSTGRES_PASSWORD}@db:5432/the_hud
      PORT: 3001
      NODE_ENV: production
      GM_PIN: ${GM_PIN}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "3080:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  hud_pgdata:
